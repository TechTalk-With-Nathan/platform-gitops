apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infrastructure-helm
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:

          - name: argocd-config
            namespace: argocd
            gitPath: infrastructure/argocd-config
            wave: 0

          - name: monitoring-crds
            namespace: observability
            gitPath: infrastructure/monitoring-crds
            wave: 1

          - name: cert-manager
            namespace: cert-manager
            gitPath: infrastructure/cert-manager
            wave: 2

          - name: sealed-secrets
            namespace: sealed-secrets
            gitPath: infrastructure/sealed-secrets
            wave: 2

          - name: loki
            namespace: observability
            gitPath: infrastructure/loki
            wave: 4

          - name: kube-prometheus-stack
            namespace: observability
            gitPath: infrastructure/kube-prometheus-stack
            wave: 3

          - name: external-dns
            namespace: external-dns
            gitPath: infrastructure/external-dns
            wave: 2

          - name: cilium
            namespace: kube-system
            gitPath: infrastructure/cilium
            wave: 2

          - name: metallb
            namespace: metallb
            gitPath: infrastructure/metallb
            wave: 5

  template:
    metadata:
      name: "{{.name}}"
      labels:
        app.kubernetes.io/part-of: infrastructure
      annotations:
        argocd.argoproj.io/sync-wave: "{{.wave}}"
    spec:
      project: infrastructure
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"

      source:
        repoURL: "https://github.com/TechTalk-With-Nathan/platform-gitops"
        targetRevision: main
        path: "{{.gitPath}}"
        kustomize: {}

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
