apiVersion: v1
kind: ServiceAccount
metadata:
  name: hook-restart-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hook-restart-role
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get","patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hook-restart-rb
subjects:
- kind: ServiceAccount
  name: hook-restart-sa
roleRef:
  kind: Role
  name: hook-restart-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  generateName: argocd-restart-hook-
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      serviceAccountName: hook-restart-sa
      containers:
      - name: restart
        image: bitnami/kubectl:latest
        command:
        - sh
        - -c
        - |
          kubectl rollout restart deployment argocd-repo-server &&
          kubectl rollout restart deployment argocd-server   # optional but often useful
      restartPolicy: OnFailure