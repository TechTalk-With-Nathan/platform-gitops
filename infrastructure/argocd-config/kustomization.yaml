apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
- https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
- restart-sa.yaml
- restart-hook.yaml


configMapGenerator:
- name: argocd-cm
  behavior: merge
  literals:
  - kustomize.buildOptions=--enable-helm --load-restrictor LoadRestrictionsNone