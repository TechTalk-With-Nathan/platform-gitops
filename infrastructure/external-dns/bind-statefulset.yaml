apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: bind9
  namespace: external-dns
spec:
  serviceName: bind9
  replicas: 1
  selector:
    matchLabels:
      app: bind9
  template:
    metadata:
      labels:
        app: bind9
    spec:
      securityContext:
        fsGroup: 101
      initContainers:
      - name: init-chown
        image: busybox
        command: ['sh', '-c', 'chown -R 101:101 /var/cache/bind']
        volumeMounts:
        - name: data
          mountPath: /var/cache/bind
      - name: init-zone
        image: busybox
        command:
          - sh
          - -c
          - |
            if [ ! -f /var/cache/bind/k8s.zone ]; then
              cp /zones/k8s.zone /var/cache/bind/k8s.zone
            fi
        volumeMounts:
          - name: zones
            mountPath: /zones
          - name: data
            mountPath: /var/cache/bind
      containers:
      - name: bind9
        image: internetsystemsconsortium/bind9:9.20
        command: ["/usr/sbin/named"]
        args:
          - "-g"
          - "-u"
          - "bind"
          - "-c"
          - "/etc/bind/named.conf"
        ports:
        - containerPort: 53
          protocol: UDP
        - containerPort: 53
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /etc/bind/named.conf.options
          subPath: named.conf.options
        - name: config
          mountPath: /etc/bind/named.conf.local
          subPath: named.conf.local
        - name: keys
          mountPath: /etc/bind/keys
        - name: config
          mountPath: /etc/bind/named.conf
          subPath: named.conf
        - name: zones
          mountPath: /zones
        - name: data
          mountPath: /var/cache/bind
        securityContext:
          runAsUser: 101
          runAsGroup: 101
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
            add: ["NET_BIND_SERVICE"]
      volumes:
      - name: config
        configMap:
          name: bind-config
      - name: zones
        configMap:
          name: bind-zone
      - name: keys
        secret:
          secretName: bind-tsig-key
          items:
          - key: external-dns.key
            path: external-dns.key
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: standard
      resources:
        requests:
          storage: 1Gi