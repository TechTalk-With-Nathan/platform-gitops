provider:
  name: rfc2136

extraArgs:
  - --txt-owner-id=k8s
  - --txt-prefix=external-dns-
  - --rfc2136-host=bind9
  - --rfc2136-port=53
  - --rfc2136-zone=example.com
  - --rfc2136-tsig-secret-alg=hmac-sha256
  - --rfc2136-tsig-axfr
  - --domain-filter=example.com
  - --source=service
  - --source=ingress
  - --registry=txt

env:
  - name: EXTERNAL_DNS_RFC2136_TSIG_SECRET
    valueFrom:
      secretKeyRef:
        name: rfc2136-keys
        key: rfc2136-tsig-secret
  - name: EXTERNAL_DNS_RFC2136_TSIG_KEYNAME
    valueFrom:
      secretKeyRef:
        name: rfc2136-keys
        key: rfc2136-tsig-keyname
sources:
  - service
  - ingress
  - gateway-httproute
  - gateway-tcproute
  - gateway-tlsroute
  - gateway-udproute
policy: sync
logLevel: info
interval: 30s
replicaCount: 1