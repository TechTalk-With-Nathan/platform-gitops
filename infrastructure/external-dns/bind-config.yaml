apiVersion: v1
kind: ConfigMap
metadata:
  name: bind-config
  namespace: external-dns
data:
  named.conf: |
    include "/etc/bind/keys/external-dns.key";
    include "/etc/bind/named.conf.options";
    include "/etc/bind/named.conf.local";

  named.conf.options: |
    options {
        directory "/var/cache/bind";
        recursion no;
        allow-query { any; };
        listen-on { any; };
        listen-on-v6 { any; };
    };

  named.conf.local: |
    zone "example.com" {
        type master;
        file "/var/cache/bind/k8s.zone";
        allow-transfer { key "externaldns-key"; };
        update-policy { grant externaldns-key zonesub ANY; };
    };