apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
- name: external-dns
  repo: https://kubernetes-sigs.github.io/external-dns/
  version: 1.20.0
  releaseName: external-dns
  valuesFile: values.yaml
  namespace: external-dns

resources:
- bind-config.yaml
- bind-service.yaml
- bind-statefulset.yaml
- bind-zone.yaml
- sealed-bind-tsig-key.yaml
- sealed-rfc2136-keys.yaml
